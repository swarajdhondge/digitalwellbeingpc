name: Bug report
description: Report something that isn't working correctly in Pulse.
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to file a bug! Please search existing issues first to avoid duplicates.
        For **security vulnerabilities**, do not file a public issue — see [SECURITY.md](../blob/main/SECURITY.md).
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: A clear and concise description of the bug.
      placeholder: When I..., Pulse...
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      description: How can we reproduce it?
      placeholder: |
        1. Go to '...'
        2. Click on '...'
        3. See error
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What did you expect to happen instead?
    validations:
      required: true
  - type: dropdown
    id: channel
    attributes:
      label: Install channel
      options:
        - GitHub release (Setup.exe / Velopack)
        - Microsoft Store
        - Built from source
        - Not sure
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Pulse version
      description: See Settings → About.
      placeholder: e.g. 2.2.0
    validations:
      required: true
  - type: input
    id: windows
    attributes:
      label: Windows version
      placeholder: e.g. Windows 11 23H2 (build 22631)
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Logs / screenshots
      description: Attach relevant screenshots or log output if available. Logs live under %LocalAppData%\Pulse\.
    validations:
      required: false
