name: Build and Release

# Fires on version tags like v2.1.0. The tag is the single source of truth
# for the release version (see the `version` job below).
on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

env:
  PROJECT: 'digital-wellbeing-app/digital-wellbeing-app.csproj'
  PACKAGE_NAME: 'DigitalWellbeingPC'
  MAIN_EXE: 'DigitalWellbeing.exe'
  # Intended final path of the MSIX packaging project (.wapproj). It may not
  # exist yet; the msix job below references it as the agreed target location.
  WAPPROJ: 'digital-wellbeing-app.Package/digital-wellbeing-app.Package.wapproj'

jobs:
  # --------------------------------------------------------------------------
  # VERSION SINGLE-SOURCING
  # Compute the version exactly once (git tag minus the leading `v`) and expose
  # it to every downstream job. Consumers: csproj <Version>, `vpk pack -v`,
  # and /p:AppxManifestVersion.
  # --------------------------------------------------------------------------
  version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.v.outputs.version }}
    steps:
      - name: Derive version from tag
        id: v
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Resolved version: $VERSION"

  # --------------------------------------------------------------------------
  # TEST GATE
  # Unit tests must pass before anything is packaged. Every build job `needs`
  # this job, so a red test run blocks the entire release.
  # --------------------------------------------------------------------------
  test:
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET 9.0
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Run unit tests
        run: dotnet test digital-wellbeing-app/Tests/Tests.csproj -c Release

  # --------------------------------------------------------------------------
  # VELOPACK BUILD (unsigned)
  # Publishes the app and produces the Velopack release set (Setup exe + delta
  # packages) as an UNSIGNED workflow artifact. It intentionally does NOT touch
  # the GitHub Release — see the UNSIGNED-ARTIFACT BOUNDARY note further down.
  # --------------------------------------------------------------------------
  velopack-build:
    needs: [version, test]
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET 9.0
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Install Velopack CLI
        run: dotnet tool install -g vpk

      - name: Stamp version into AssemblyInfo.cs and app.manifest
        shell: pwsh
        run: ./.github/scripts/stamp-version.ps1 -Version "${{ needs.version.outputs.version }}"

      # Inject the tag version into the csproj <Version> via an MSBuild property
      # override (cleaner than rewriting the file on disk).
      - name: Publish application
        run: dotnet publish ${{ env.PROJECT }} -c Release -p:Version=${{ needs.version.outputs.version }} -o ./publish

      # Brand the Setup.exe so it doesn't look like a generic/untrusted bundle:
      #   --icon        the Pulse app icon on Setup.exe + Add/Remove Programs
      #   --packTitle   friendly display name ("Pulse", not the packId) in the installer UI
      #   --packAuthors publisher shown in the installer + Programs and Features
      # (packId stays DigitalWellbeingPC — it's the stable update identity, not a display name.)
      # NOTE: the "unknown publisher" SmartScreen warning is separate — that needs code signing
      # (the SignPath step at the boundary below), not packaging metadata.
      - name: Create Velopack release
        run: >
          vpk pack
          -u ${{ env.PACKAGE_NAME }}
          -v ${{ needs.version.outputs.version }}
          -p ./publish
          -o ./releases
          --mainExe ${{ env.MAIN_EXE }}
          --packTitle "Pulse"
          --packAuthors "Swaraj Dhondge"
          --icon digital-wellbeing-app/Resources/Icons/digital-balance-icon.ico

      - name: Upload Velopack artifacts (unsigned)
        uses: actions/upload-artifact@v4
        with:
          name: velopack-releases
          path: ./releases/*
          if-no-files-found: error
          retention-days: 7

  # --------------------------------------------------------------------------
  # MSIX BUILD (unsigned x64 .msix for Partner Center)
  # Builds via the Windows SDK (makeappx). Store submission stays MANUAL for now —
  # we only upload the package as a workflow artifact for you to hand-upload.
  # --------------------------------------------------------------------------
  msix-build:
    needs: [version, test]
    # Build the Store MSIX with the Windows SDK (dotnet publish -> makepri ->
    # makeappx) rather than the .wapproj. The wapproj needs the Visual Studio UWP
    # workload, which the hosted images no longer reliably ship: windows-latest
    # (VS 18) throws APPX3217 ("UAP.props for 10.0.19041.0 cannot be located") and
    # windows-2022 silently skips packaging. The SDK tools are always present.
    # Store identity is fixed in the manifest (Identity/Name
    # SwarajDhondge.DigitalWellbeingPC, Publisher CN=516C9AB9-2BCA-4787-9354-4A2FFCDBED01,
    # Store ID 9ND5GNMBQVQ7). Produces an unsigned x64 .msix; the Store re-signs.
    runs-on: windows-latest
    # Non-blocking: a packaging hiccup must never block the Velopack GitHub release.
    continue-on-error: true
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET 9.0
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Stamp version into AssemblyInfo.cs and app.manifest
        shell: pwsh
        run: ./.github/scripts/stamp-version.ps1 -Version "${{ needs.version.outputs.version }}"

      - name: Build MSIX (x64) via Windows SDK
        shell: pwsh
        env:
          VER: ${{ needs.version.outputs.version }}
        run: |
          $ErrorActionPreference = 'Stop'
          $ws = $env:GITHUB_WORKSPACE
          $stage = Join-Path $ws 'stage'
          $out = Join-Path $ws 'AppPackages'
          New-Item -ItemType Directory -Force -Path $out | Out-Null

          dotnet publish digital-wellbeing-app/digital-wellbeing-app.csproj -c Release -r win-x64 `
            --self-contained true -p:Version=$env:VER -p:PublishSingleFile=false -o $stage

          Copy-Item digital-wellbeing-app.Package/Package.appxmanifest (Join-Path $stage 'AppxManifest.xml') -Force
          New-Item -ItemType Directory -Force -Path (Join-Path $stage 'Images') | Out-Null
          Copy-Item digital-wellbeing-app.Package/Images/*.png (Join-Path $stage 'Images') -Force

          # Stamp the 4-part version (tag + ".0") and declare x64 on the identity.
          $mf = Join-Path $stage 'AppxManifest.xml'
          $x = Get-Content $mf -Raw
          $x = $x -replace 'Version="[\d.]+"\s*/>', ("Version=`"$($env:VER).0`" ProcessorArchitecture=`"x64`" />")
          Set-Content $mf $x

          # Newest installed Windows SDK bin\<ver>\x64 that has makeappx/makepri.
          $sdkRoot = 'C:\Program Files (x86)\Windows Kits\10\bin'
          $sdk = Get-ChildItem $sdkRoot -Directory |
            Where-Object { $_.Name -match '^10\.0\.' -and (Test-Path (Join-Path $_.FullName 'x64\makeappx.exe')) } |
            Sort-Object Name -Descending | Select-Object -First 1
          $tool = Join-Path $sdk.FullName 'x64'
          Write-Host "Using SDK tools: $tool"

          & "$tool\makepri.exe" createconfig /cf (Join-Path $ws 'priconfig.xml') /dq en-US /pv 10.0.0 /o
          & "$tool\makepri.exe" new /pr $stage /cf (Join-Path $ws 'priconfig.xml') /mn $mf /of (Join-Path $stage 'resources.pri') /o
          $msix = Join-Path $out "Pulse-$($env:VER)-x64.msix"
          & "$tool\makeappx.exe" pack /d $stage /p $msix /o
          if (-not (Test-Path $msix)) { Write-Error 'makeappx did not produce a .msix'; exit 1 }
          Write-Host ("Built {0} ({1} MB)" -f $msix, [math]::Round((Get-Item $msix).Length/1MB,1))

      - name: Upload MSIX artifact (unsigned)
        uses: actions/upload-artifact@v4
        with:
          name: msix-package
          path: 'AppPackages/*.msix'
          if-no-files-found: error
          retention-days: 7

  # ==========================================================================
  # >>> UNSIGNED-ARTIFACT BOUNDARY <<<
  #
  # Everything ABOVE produces UNSIGNED build outputs (uploaded as the
  # `velopack-releases` and `msix-package` artifacts). Everything BELOW consumes
  # already-built artifacts and attaches them to the GitHub Release.
  #
  # A future code-signing step slots in HERE without restructuring: add a
  # `sign` job that `needs: [velopack-build, msix-build]`, downloads the
  # unsigned artifacts, submits them to SignPath, and re-uploads SIGNED
  # artifacts under the SAME artifact names. The `release` job then only needs
  # to depend on `sign` instead of the two build jobs.
  #
  #  sign:
  #    needs: [velopack-build, msix-build]
  #    runs-on: ubuntu-latest
  #    steps:
  #      - uses: actions/download-artifact@v4
  #      - name: Submit signing request to SignPath
  #        uses: signpath/github-action-submit-signing-request@v2
  #        with:
  #          api-token: ${{ secrets.SIGNPATH_API_TOKEN }}
  #          organization-id: ${{ secrets.SIGNPATH_ORGANIZATION_ID }}
  #          project-slug: DigitalWellbeingPC
  #          signing-policy-slug: release-signing
  #          github-artifact-id: ${{ ... }}
  #          wait-for-completion: true
  #      - uses: actions/upload-artifact@v4   # re-upload SIGNED under same names
  # ==========================================================================

  # --------------------------------------------------------------------------
  # RELEASE ATTACH
  # Downloads the built (currently unsigned) artifacts, generates checksums, and
  # publishes the GitHub Release. Depends only on the build jobs today; point it
  # at `sign` once the boundary above is filled in.
  # --------------------------------------------------------------------------
  release:
    # Depends only on the Velopack build so a missing-MSIX-asset failure never
    # blocks the GitHub release. The MSIX artifact is attached opportunistically.
    needs: [version, velopack-build]
    runs-on: ubuntu-latest
    steps:
      # Checkout so the pre-recorded demo assets committed at this tag
      # (.github/demo/demo.{mp4,gif}) can be attached as release assets. The site
      # <video> and README <img> point at releases/latest/download/demo.*, so
      # publishing this release auto-swaps the demo everywhere — no push to main.
      # The demo can't be recorded on CI (no GUI); it is produced locally before
      # tagging via scripts/record-demo.ps1. Missing files are tolerated below
      # (fail_on_unmatched_files: false) so a release without a demo still ships.
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download Velopack artifacts
        uses: actions/download-artifact@v4
        with:
          name: velopack-releases
          path: ./releases

      - name: Download MSIX artifact (if the packaging build succeeded)
        continue-on-error: true
        uses: actions/download-artifact@v4
        with:
          name: msix-package
          path: ./msix

      # SHA256SUMS.txt over the Velopack release set plus the MSIX output (if any).
      # Paths are relativized so the checksum file is portable for verifiers.
      - name: Generate SHA256SUMS.txt
        run: |
          {
            find ./releases -type f
            [ -d ./msix ] && find ./msix -type f -name '*.msix'
          } | while read -r f; do
            sha256sum "$f"
          done | sed 's|\./||' > SHA256SUMS.txt
          echo "----- SHA256SUMS.txt -----"
          cat SHA256SUMS.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Release ${{ github.ref_name }}
          generate_release_notes: true
          fail_on_unmatched_files: false
          files: |
            ./releases/*
            ./msix/*.msix
            SHA256SUMS.txt
            .github/demo/demo.mp4
            .github/demo/demo.gif
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
