name: WinGet Release

# Auto-submits a PR to microsoft/winget-pkgs whenever a GitHub Release is
# published. It points at the Velopack Setup exe attached to that release by
# release.yml (named like DigitalWellbeingPC-win-Setup.exe).
on:
  release:
    types: [published]

jobs:
  publish-winget:
    runs-on: ubuntu-latest
    # Skip drafts/prereleases — only ship stable releases to WinGet.
    if: ${{ !github.event.release.prerelease }}
    steps:
      - name: Publish to WinGet
        uses: vedantmgoyal9/winget-releaser@v2
        with:
          # PackageIdentifier convention is `Publisher.PackageName`. This is the
          # real, final Store publisher display name + app name.
          identifier: SwarajDhondge.DigitalWellbeingPC
          # Omit `version` so winget-releaser derives it from the tag with the
          # leading `v` stripped (e.g. v2.2.0 -> 2.2.0). Passing tag_name verbatim
          # would incorrectly yield a "v2.2.0" package version.
          # Match the Velopack Setup installer among the release assets (Velopack
          # emits either Setup.exe or <PackId>-win-Setup.exe depending on version).
          installers-regex: '.*Setup\.exe$'
          # A Personal Access Token (classic) with `public_repo` scope. It must
          # belong to the account that owns the winget-pkgs fork referenced in
          # `fork-user`. Store it as the WINGET_TOKEN repository secret — the
          # default GITHUB_TOKEN cannot push to the microsoft/winget-pkgs fork.
          token: ${{ secrets.WINGET_TOKEN }}
          # Account holding the microsoft/winget-pkgs fork used to open the PR.
          fork-user: ${{ github.repository_owner }}
