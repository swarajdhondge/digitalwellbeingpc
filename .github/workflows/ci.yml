name: CI

# Runs on every PR into main and every push to main. Fast feedback only —
# no packaging or publishing happens here (that lives in release.yml).
on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

# A newer push to the same ref cancels the in-flight run for that ref.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # --------------------------------------------------------------------------
  # WPF app: build + unit tests (Windows-only, WPF / net9.0-windows).
  # --------------------------------------------------------------------------
  app:
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET 9.0
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Restore
        run: dotnet restore DigitalWellbeing.sln

      - name: Build
        run: dotnet build DigitalWellbeing.sln -c Release --no-restore

      - name: Unit tests
        run: dotnet test digital-wellbeing-app/Tests/Tests.csproj -c Release --no-build

  # --------------------------------------------------------------------------
  # Marketing site (pulse/, Next.js). Cross-platform, so Ubuntu is fine.
  # --------------------------------------------------------------------------
  site:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: pulse
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: pulse/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build
